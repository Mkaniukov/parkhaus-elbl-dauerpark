[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  targetPort = 5173

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # docx bricht bei reiner esbuild-Bündelung oft; als Node-Modul mitliefern
  external_node_modules = ["docx"]
  # Function-Timeout (submit + Google/PDF): Netlify Dashboard → Site configuration → Functions → Function timeout (max. 26s je nach Plan)
