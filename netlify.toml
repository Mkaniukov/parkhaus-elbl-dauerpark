[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  targetPort = 5173

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # docx bricht bei reiner esbuild-Bündelung oft; als Node-Modul mitliefern
  external_node_modules = ["docx"]
  # submit wartet auf Google Doc + PDF (Standard ist oft 10s — bei Timeout im Dashboard erhöhen, z. B. 26s)
  timeout = 26
